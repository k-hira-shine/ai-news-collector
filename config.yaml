# ── SNS投稿ジェネレーター テンプレート定義 ─────────────────
# テンプレートは https://k-hira-shine.github.io/fiction-log-buzz-report/templates.html の6型を使用
post_templates:
  # 1投稿あたりの最大文字数（X制限に合わせて）
  max_chars: 140
  # テンプレートごとに生成する投稿数
  posts_per_template: 5
  # 元ポストのサンプリング数（エンゲ率上位からこの件数をランダムに使う）
  sample_size: 20

  templates:
    - id: "instant_knowledge"
      name: "型1: インスタント・ナレッジ（リスト型）"
      description: "知識を箇条書きで整理し、タイパ重視の読者に刺さるリスト投稿"
      prompt_hint: |
        このSNS成功者のポスト内容を参考に、以下のどちらかのテンプレートで日本語の投稿文を作ってください。

        【A: 「〇〇な人の特徴N選」型】
        [特定の状態・属性] な人の [N] つの特徴
        1. [意外性のある特徴 + 一文の補足説明]
        2. [特徴 + 補足]
        3. [特徴 + 補足]
        ...

        【B: 対比型（上位 vs 下位）】
        [上位・有利な属性]
        ・[行動・思考1]
