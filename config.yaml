# AI News Collector 設定ファイル
# Primary: Gemini 2.5 Pro / Fallback: Gemini 2.5 Flash (503 時自動切替)

collection:
  max_age_days: 2

x_twitter:
  search_queries:
    # 英語：主要モデル・企業・トレンド
    - "ChatGPT OR Claude OR Gemini OR GPT-5 OR OpenAI OR Anthropic OR LLM OR AI agent -filter:replies lang:en min_faves:100"
    # 英語：開発・ツール系
    - "Claude Code OR Cursor AI OR GitHub Copilot OR Devin OR MCP OR AI coding OR vibe coding -filter:replies lang:en"
    # 英語：研究・業界動向
    - "AI safety OR AI alignment OR AGI OR foundation model OR multimodal OR AI regulation -filter:replies lang:en min_faves:50"
    # 日本語：主要モデル名（カタカナ・英語混在）
    - "ChatGPT OR ジェミニ OR Gemini OR クロード OR Claude OR GPT OR 生成AI -filter:replies lang:ja"
    # 日本語：AI活用・開発・ビジネス
    - "AIエージェント OR AI自動化 OR AI副業 OR Claude Code OR プロンプト OR 大規模言語モデル -filter:replies lang:ja"
  max_results_per_query: 150
  must_follow_accounts:
    # ── 公式アカウント ──────────────────────────────
    - handle: "OpenAI"
      label: "OpenAI公式"
      priority: critical
    - handle: "AnthropicAI"
      label: "Anthropic公式"
      priority: critical
    - handle: "GoogleDeepMind"
      label: "DeepMind公式"
      priority: critical
    - handle: "GoogleAI"
      label: "Google AI公式"
      priority: critical
    - handle: "AIatMeta"
      label: "Meta AI公式"
      priority: critical
    - handle: "nvidia"
      label: "NVIDIA公式"
      priority: high
    - handle: "huggingface"
      label: "Hugging Face公式"
      priority: critical
    # ── 海外トップ研究者・CEO ────────────────────────
    - handle: "sama"
      label: "Sam Altman (OpenAI CEO)"
      priority: critical
    - handle: "DarioAmodei"
      label: "Dario Amodei (Anthropic CEO)"
      priority: critical
    - handle: "demishassabis"
      label: "Demis Hassabis (DeepMind CEO)"
      priority: high
    - handle: "karpathy"
      label: "Andrej Karpathy"
      priority: high
    - handle: "ylecun"
      label: "Yann LeCun (Meta Chief AI Scientist)"
      priority: high
    - handle: "simonw"
      label: "Simon Willison"
      priority: high
    # ── 日本語インフルエンサー ──────────────────────
    - handle: "rute1203d"
      label: "てる@AIエージェントマフィア"
      priority: high
    - handle: "mercarioji"
      label: "メルおじ|AI×X"
      priority: high
    - handle: "usutaku_channel"
      label: "usutaku"
      priority: high
    - handle: "aonboaonbo"
      label: "あおんぼ@総合WEBマーケプロデューサー"
      priority: high
    - handle: "shota7180"
      label: "木内翔大@SHIFT AI代表"
      priority: high
    - handle: "umiyuki_ai"
      label: "うみゆき@AI研究"
      priority: high
    - handle: "ai_hakase_"
      label: "AI博士"
      priority: high
  min_engagement: 10
  max_results_per_account: 20
  apify_actor: "xquik/x-tweet-scraper"
  apify_monthly_budget_usd: 29.0
  apify_warning_threshold: 0.8

# Silent Failure 検知: 成功 exit した実行でも内部劣化があればログへ警告
alerts:
  enabled: true
  analysis_json_save_alert: true       # data/analysis への JSON 保存失敗で critical

analysis:
  models:
    stage1_filter: "gemini-2.5-pro"
    stage2_analysis: "gemini-2.5-pro"
    fallback: "gemini-2.5-flash"
  thinking_budget:
    stage1: 128
    stage2: 512
    stage3: 256
  categories:
    - "モデル/ツール"
    - "企業動向"
    - "規制/政策"
    - "研究論文"
    - "資金調達"
    - "ユースケース"
  top_n: 10
  stage1_top_n: 100
  enable_previous_day_context: true

scoring:
  freshness_bonus:
    - hours: 3
      bonus: 2.0
    - hours: 6
      bonus: 1.0
    - hours: 12
      bonus: 0.5
  official_source_bonus: 2.0
  must_follow_bonus: 1.5
  x_engagement_bonus:
    - likes: 5000
      bonus: 1.5
    - likes: 1000
      bonus: 1.0
    - likes: 500
      bonus: 0.5

cache:
  seen_urls_retention_days: 2

# ── HackerNews 収集（collect_all() 経由、data/hn/ に保存） ────────────
hackernews:
  enabled: true
  min_score: 10          # HN ポイント数の足切り（Python側でフィルタ）
  max_age_hours: 48      # 何時間前まで取得するか
  max_items: 30          # 最大取得件数（AI関連フィルタ後）
  filter_keywords:       # タイトルにこれらを含む記事のみ収集
    - ai
    - llm
    - chatgpt
    - claude
    - gemini
    - openai
    - anthropic
    - gpt
    - deepmind
    - mistral
    - llama
    - machine learning
    - neural

# ── arxiv 収集（collect_all() 経由、data/hn/ に保存） ─────────────────
arxiv:
  enabled: true
  categories:
    - cs.AI
    - cs.LG
    - cs.CL
  max_results_per_category: 10   # カテゴリごとの最大取得件数
  max_age_days: 2                # 何日前まで取得するか

