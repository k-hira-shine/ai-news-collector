# ── AIツール・機能リリース追跡 ────────────────────────────────
tools_tracking:
  enabled: true
  max_age_days: 7          # 何日前までのRSSを取得するか
  max_items_per_feed: 30   # 1フィードあたり最大取得件数
  # Gemini / Claude / ChatGPT を分類し、表示上で上位に優先する
  # 過去に保存済みで tool_family が空の行を、次回ランで Gemini に再分析（APIコスト上限あり）
  backfill_missing_tool_family:
    enabled: true
    max_per_run: 200   # 既存全件を1回で処理できるよう大きめに設定
    days: 45

  # Reddit Data API（承認・Secrets設定後に有効化）
  reddit:
    enabled: true
    sort: new              # new / hot / top
    time_filter: day       # sort=top の場合のみ使用
    max_items_per_subreddit: 25
    user_agent: "python:ai-news-collector:v1.0 (by /u/Junior-Frosting-3658)"
    # 最優先3つを先頭に、件数は他より多く取得（max_items_per_subredditを上書き）
    subreddits:
      - name: ClaudeAI        # Claude 最優先
        max_items: 40
      - name: ChatGPT         # ChatGPT 優先
        max_items: 40
      - name: Gemini          # Gemini 優先
        max_items: 40
      - name: artificial      # その他
        max_items: 20
      - name: MachineLearning
        max_items: 20
      - name: LocalLLaMA
        max_items: 20
      - name: AItools
        max_items: 15

