# ── SNS投稿ジェネレーター テンプレート定義 ─────────────────
post_templates:
  # 1投稿あたりの最大文字数（X制限に合わせて）
  max_chars: 140
  # テンプレートごとに生成する投稿数
  posts_per_template: 5
  # 元ポストのサンプリング数（エンゲ率上位からこの件数をランダムに使う）
  sample_size: 20

  templates:
    - id: "lessons_learned"
      name: "教訓箇条書き型"
      description: "成功者の知見を箇条書きで紹介するポスト"
      prompt_hint: |
        このSNS成功者のポスト内容を参考に、「〇〇が語る△△の教訓」形式の投稿文を日本語で作ってください。
        - 冒頭に「◯◯が語る〜」という見出しをつける
        - 本文はkey_insightsを元に箇条書き3〜5個
        - 最後に一言まとめ
        - 140字以内に収める

    - id: "question_hook"
      name: "問いかけフック型"
      description: "読者への問いかけで始まり、答えへ誘導するポスト"
      prompt_hint: |
        このSNS成功者のポスト内容を参考に、読者への問いかけで始まる投稿文を日本語で作ってください。
        - 冒頭は「〜ってどういうこと？」「あなたは〜できていますか？」のような問いかけ
        - 内容のポイントを1〜2文で展開
        - 最後に行動を促す一言
        - 140字以内に収める

    - id: "thread_starter"
      name: "スレッド冒頭型"
      description: "続きが読みたくなるスレッドの1ツイート目"
      prompt_hint: |
        このSNS成功者のポスト内容を参考に、スレッドの冒頭ツイートとして続きが読みたくなる投稿文を日本語で作ってください。
        - 「〜について話します🧵」「〜の真実（全5ツイート）」のような形式
        - 読者が「続きが気になる」と思える問題提起を入れる
        - 140字以内に収める

    - id: "insight_quote"
      name: "名言引用型"
      description: "成功者の言葉を引用してコメントするポスト"
      prompt_hint: |
        このSNS成功者のポスト内容から印象的な考え方を取り出し、引用コメント形式の投稿文を日本語で作ってください。
        - 「『〜』」という引用形式で重要な考えを強調
        - その下に自分のコメント（1〜2文）
        - 140字以内に収める

    - id: "before_after"
      name: "ビフォーアフター型"
      description: "変化・対比を使って価値を伝えるポスト"
      prompt_hint: |
        このSNS成功者のポスト内容を参考に、ビフォーアフター（変化・対比）を使った投稿文を日本語で作ってください。
        - 「〜だった私が、〜になれた理由」「〜をやめたら〜が変わった」のような対比構造
        - 具体的な変化を1〜2文で
        - 140字以内に収める
