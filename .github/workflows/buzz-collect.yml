name: Buzz Ranking Collector

on:
  workflow_dispatch:
    inputs:
      account:
        description: '追加するアカウント（@なし、空の場合は全アカウント更新）'
        required: false
        default: ''
      days:
        description: '何日前まで遡るか'
        required: false
        default: '30'
  repository_dispatch:
    types: [buzz-add-account]

concurrency:
  group: buzz-collector
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Run buzz collector
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          # workflow_dispatch か repository_dispatch かで引数を分岐
          ACCOUNT="${{ github.event.inputs.account || github.event.client_payload.account }}"
          DAYS="${{ github.event.inputs.days || github.event.client_payload.days || '30' }}"
          if [ -n "$ACCOUNT" ]; then
            python run_buzz.py --add "$ACCOUNT" --days "$DAYS"
          else
            python run_buzz.py --days "$DAYS"
          fi

      - name: Rebuild buzz.html with PAT embedded
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python build_buzz.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          STASH_CREATED=0
          if [ -n "$(git status --porcelain -- data docs config.yaml)" ]; then
            git stash push --include-untracked --message "buzz-data" -- data docs config.yaml
            STASH_CREATED=1
          fi
          git pull --rebase
          if [ "$STASH_CREATED" -eq 1 ]; then
            git stash pop
          fi
          git add data/buzz.json docs/buzz.html config.yaml
          git diff --staged --quiet || git commit -m "buzz: $(date -u +%Y-%m-%d_%H%M) ${{ github.event.inputs.account }}"
          git push
