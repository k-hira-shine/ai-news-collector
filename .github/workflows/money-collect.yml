name: AI Money Cases Collector

on:
  workflow_dispatch:          # 手動実行のみ（まずはテスト用）
    inputs:
      mode:
        description: '実行モード'
        required: false
        default: 'full'
        type: choice
        options:
          - full           # 収集 → 分析 → ページ生成
          - analyze-only   # 収集済みデータの分析のみ（再分析用）
          - page-only      # ページ生成のみ
  # 本運用時は以下をコメントアウト解除して既存ワークフローと同じスケジュールで動かす
  # schedule:
  #   - cron: '0 17 * * *'   # JST 02:00
  #   - cron: '0 11 * * *'   # JST 20:00

concurrency:
  group: ai-money-collector
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Run money collector
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"
          if [ "$MODE" = "analyze-only" ]; then
            python run_money.py --analyze-only
          elif [ "$MODE" = "page-only" ]; then
            python run_money.py --page-only
          else
            python run_money.py
          fi

      - name: Commit & push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          STASH_CREATED=0
          if [ -n "$(git status --porcelain -- data docs)" ]; then
            git stash push --include-untracked --message "money-data" -- data docs
            STASH_CREATED=1
          fi
          git pull --rebase
          if [ "$STASH_CREATED" -eq 1 ]; then
            git stash pop
          fi
          git add data/ docs/
          git diff --staged --quiet || git commit -m "money: $(date -u +%Y-%m-%d_%H%M)"
          git push
