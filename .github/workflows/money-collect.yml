name: AI Money Cases Collector

on:
  workflow_dispatch:          # 手動実行のみ（まずはテスト用）
    inputs:
      mode:
        description: '実行モード'
        required: false
        default: 'full'
        type: choice
        options:
          - full           # 収集 → 分析 → ページ生成
          - analyze-only   # 収集済みデータの分析のみ（再分析用）
          - page-only      # ページ生成のみ
  schedule:
    - cron: '20 18 * * *'    # JST 03:20（1日1回）

concurrency:
  group: ai-money-collector
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Run money collector
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"
          if [ "$MODE" = "analyze-only" ]; then
            python run_money.py --analyze-only
          elif [ "$MODE" = "page-only" ]; then
            python run_money.py --page-only
          else
            python run_money.py
          fi

      - name: Commit & push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git diff --staged --quiet || git commit -m "money: $(date -u +%Y-%m-%d_%H%M)"
          # push失敗時は pull --rebase して最大3回リトライ
          for i in 1 2 3; do
            git push && break
            echo "Push failed (attempt $i), retrying after pull --rebase..."
            git pull --rebase
          done
