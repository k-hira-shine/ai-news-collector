name: AI News Collector

on:
  workflow_dispatch:          # 手動実行
    inputs:
      mode:
        description: '実行モード'
        required: false
        default: 'full'
        type: choice
        options:
          - full            # 収集 → 分析 → ダッシュボード生成
          - analyze-only    # 収集スキップ、既存データで分析＋ページ生成
          - dashboard-only  # ページ生成のみ（高速）
  schedule:
    - cron: '0 17 * * *'     # JST 02:00 (UTC 17:00 前日)
    - cron: '0 7 * * *'      # JST 16:00 (UTC 07:00)

concurrency:
  group: ai-news-collector
  cancel-in-progress: true   # 古いrunを自動キャンセルして最新を優先

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Install Japanese fonts (Noto CJK)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk fonts-noto-cjk-extra fonts-noto-color-emoji
          fc-cache -f

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run collector
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"
          if [ "$MODE" = "analyze-only" ]; then
            python main.py --analyze-only
          elif [ "$MODE" = "dashboard-only" ]; then
            python -c "import sys; sys.path.insert(0,'.'); from dashboard import generate_dashboard, generate_strategy_page; from money_dashboard import generate_money_page; generate_dashboard('docs/index.html'); generate_strategy_page('docs/strategy.html'); generate_money_page('docs/money.html'); print('Dashboard regenerated')"
          else
            python main.py
          fi

      - name: Build buzz ranking page
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -f "data/buzz.json" ]; then
            python build_buzz.py
          else
            echo "data/buzz.json not found, skipping buzz page build"
          fi

      - name: Build HN + arxiv page
        run: python build_hn.py

      - name: Build tools tracking page
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python build_tools.py

      - name: Commit & push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git diff --staged --quiet || git commit -m "data: $(date -u +%Y-%m-%d_%H%M)"
          for i in 1 2 3; do
            git push && break
            echo "Push failed (attempt $i), retrying after pull --rebase..."
            git pull --rebase
          done

      - name: Deploy to GitHub Pages
        env:
          PAGES_DEPLOY_KEY: ${{ secrets.PAGES_DEPLOY_KEY }}
        run: |
          if [ -z "${PAGES_DEPLOY_KEY}" ]; then
            echo "PAGES_DEPLOY_KEY is not set; skipping GitHub Pages deploy."
            exit 0
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "${PAGES_DEPLOY_KEY}" > ~/.ssh/pages_deploy_key
          chmod 600 ~/.ssh/pages_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/pages_deploy_key -o IdentitiesOnly=yes"
          cd docs
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "deploy: $(date -u +%Y-%m-%d_%H%M)"
          git push --force \
            "git@github.com:k-hira-shine/ai-news-dashboard.git" \
            HEAD:main
