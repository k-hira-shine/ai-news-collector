name: AI News Collector

on:
  workflow_dispatch:          # Cloud Scheduler (GCP) から JST 07:00 / 18:00 に発火

concurrency:
  group: ai-news-collector
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Install Japanese fonts (Noto CJK)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk fonts-noto-cjk-extra fonts-noto-color-emoji
          fc-cache -f

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run collector
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Commit & push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          STASH_CREATED=0
          if [ -n "$(git status --porcelain -- data docs)" ]; then
            git stash push --include-untracked --message "ai-news-data" -- data docs
            STASH_CREATED=1
          fi
          git pull --rebase
          if [ "$STASH_CREATED" -eq 1 ]; then
            git stash pop
          fi
          git add data/ docs/
          git diff --staged --quiet || git commit -m "data: $(date -u +%Y-%m-%d_%H%M)"
          git push

      - name: Deploy to GitHub Pages
        env:
          PAGES_DEPLOY_TOKEN: ${{ secrets.PAGES_DEPLOY_TOKEN }}
        run: |
          if [ -z "${PAGES_DEPLOY_TOKEN}" ]; then
            echo "PAGES_DEPLOY_TOKEN is not set; skipping GitHub Pages deploy."
            exit 0
          fi
          cd docs
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "deploy: $(date -u +%Y-%m-%d_%H%M)"
          git push --force \
            "https://x-access-token:${PAGES_DEPLOY_TOKEN}@github.com/k-hira-shine/ai-news-dashboard.git" \
            HEAD:main
