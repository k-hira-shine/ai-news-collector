name: AI News Collector

on:
  workflow_dispatch:          # Cloud Scheduler (GCP) から JST 07:00 / 18:00 に発火

concurrency:
  group: ai-news-collector
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run collector
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          X_COOKIES: ${{ secrets.X_COOKIES }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py

      - name: Commit & push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          STASH_CREATED=0
          if [ -n "$(git status --porcelain -- data docs)" ]; then
            git stash push --include-untracked --message "ai-news-data" -- data docs
            STASH_CREATED=1
          fi
          git pull --rebase
          if [ "$STASH_CREATED" -eq 1 ]; then
            git stash pop
          fi
          git add data/ docs/
          git diff --staged --quiet || git commit -m "data: $(date -u +%Y-%m-%d_%H%M)"
          git push
